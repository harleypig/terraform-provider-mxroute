# Auto-fixing pre-commit hooks (modifying). Run ONCE as a prep step before
# committing:
#   pre-commit run --all-files --config .pre-commit-config-fix.yaml
# then run the check config. Never mid-session, per the global rules/pre-commit.md.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        # docs/ is tfplugindocs-generated verbatim; editing it here would make
        # the committed docs differ from `make generate` and fail the CI diff.
        exclude: ^docs/
      - id: end-of-file-fixer
        exclude: ^docs/

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint-fmt      # `golangci-lint fmt` — gofumpt + goimports
      - id: golangci-lint-full     # `golangci-lint run --fix` — autofixable lint

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint-fix-docker
        # docs/ is tfplugindocs-generated (see `make generate`); its output
        # format is not ours to lint.
        exclude: ^docs/
